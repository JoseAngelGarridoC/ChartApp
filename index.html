<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Alabanza — Nashville</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>

    /* ══════════════════════════════════
       TEMA OSCURO (por defecto)
    ══════════════════════════════════ */
    :root {
      --gold:        #C9A84C;
      --gold-bright: #F0D07A;
      --gold-dim:    #6A5520;
      --gold-glow:   rgba(201,168,76,0.18);
      --bg-deep:     #06060C;
      --bg-main:     #0A0A14;
      --bg-card:     #10101C;
      --bg-sidebar:  #070710;
      --bg-hover:    #16162A;
      --text-main:   #EAE0CC;
      --text-dim:    #5A5570;
      --border:      #1A1A2C;
      --key-pill-text: #06060C;
    }

    /* ══════════════════════════════════
       TEMA CLARO
    ══════════════════════════════════ */
    body.light {
      --gold:        #A07820;
      --gold-bright: #7A5A10;
      --gold-dim:    #B89030;
      --gold-glow:   rgba(160,120,32,0.14);
      --bg-deep:     #F5F0E8;
      --bg-main:     #FAF7F0;
      --bg-card:     #FFFFFF;
      --bg-sidebar:  #EDE8DC;
      --bg-hover:    #E4DDC8;
      --text-main:   #1E1810;
      --text-dim:    #8A8070;
      --border:      #D8CEB8;
      --key-pill-text: #FAF7F0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      display: flex;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

    /* ══════════════════════════════════
       SIDEBAR
    ══════════════════════════════════ */
    #sidebar {
      width: 285px;
      min-width: 285px;
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1),
                  min-width 0.3s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.25s ease,
                  border-color 0.3s,
                  background 0.3s;
    }

    body.sidebar-hidden #sidebar {
      width: 0;
      min-width: 0;
      opacity: 0;
      border-right-color: transparent;
    }

    /* Brand area */
    .brand-area {
      padding: 24px 18px 18px 22px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      transition: border-color 0.3s;
    }

    .brand-text { flex: 1; min-width: 0; }

    .brand-top {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .brand-name {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-shadow: 0 0 30px var(--gold-glow);
      white-space: nowrap;
    }

    .brand-sub {
      margin-top: 8px;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Botón Hamburguesa (dentro del sidebar) ── */
    .ham-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
      margin-top: 2px;
    }

    .ham-btn:hover { border-color: var(--gold-dim); background: var(--bg-hover); }

    .ham-bar {
      width: 15px;
      height: 2px;
      background: var(--gold);
      border-radius: 2px;
    }

    /* ── Botón flotante para reabrir ── */
    #btn-reopen {
      position: fixed;
      top: 25px;
      left: 25px;
      z-index: 200;
      width: 34px;
      height: 38px;
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, background 0.2s, border-color 0.3s;
      box-shadow: 3px 0 14px rgba(0,0,0,0.35);
    }

    body.sidebar-hidden #btn-reopen { opacity: 1; pointer-events: all; }
    #btn-reopen:hover { background: var(--bg-hover); }

    /* ── Buscador ── */
    .search-wrap { padding: 13px 14px 9px; flex-shrink: 0; }

    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      color: var(--text-main);
      outline: none;
      font-family: 'Lato', sans-serif;
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }

    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { border-color: var(--gold-dim); }

    /* ── Lista canciones ── */
    #song-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }

    .list-section-header {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 12px 22px 6px;
      font-family: 'Cinzel', serif;
    }

    .song-item {
      cursor: pointer;
      padding: 11px 22px;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .song-num {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      color: var(--text-dim);
      padding-top: 2px;
      min-width: 18px;
    }

    .song-info { flex: 1; min-width: 0; }

    .song-title-list {
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
      transition: color 0.15s;
    }

    .song-meta { font-size: 0.67rem; color: var(--text-dim); }

    /* ── Estrella de favorito ── */
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 0 0 4px;
      font-size: 0.85rem;
      line-height: 1;
      color: var(--text-dim);
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
      opacity: 0;
    }

    .song-item:hover .star-btn,
    .star-btn.fav { opacity: 1; }

    .star-btn.fav { color: var(--gold); }

    .star-btn:hover { transform: scale(1.25); }

    .song-item:hover { background: var(--bg-hover); border-left-color: var(--gold-dim); }
    .song-item:hover .song-title-list { color: var(--gold-bright); }
    .song-item.active { background: var(--bg-hover); border-left-color: var(--gold); }
    .song-item.active .song-title-list { color: var(--gold); }
    .song-item.active .song-num { color: var(--gold-dim); }
    .song-item.active .star-btn { opacity: 1; }

    /* ── Footer sidebar: dark/light toggle ── */
    .sidebar-footer {
      flex-shrink: 0;
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.3s;
    }

    .footer-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      user-select: none;
    }

    /* Toggle switch */
    .toggle-track {
      width: 46px;
      height: 26px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    body.light .toggle-track {
      background: var(--gold);
      border-color: var(--gold);
    }

    .toggle-thumb {
      width: 20px;
      height: 20px;
      background: var(--text-dim);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), background 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 1;
    }

    body.light .toggle-thumb {
      transform: translateX(20px);
      background: #FFFFFF;
    }

    /* ══════════════════════════════════
       PANEL PRINCIPAL
    ══════════════════════════════════ */
    #main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      background: var(--bg-main);
      position: relative;
      transition: background 0.3s;
    }

    #welcome {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 5rem;
      color: var(--gold-dim);
      line-height: 1;
      font-family: 'Cinzel', serif;
    }

    #song-view {
      max-width: 940px;
      padding: 44px 48px 60px;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .deco-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.25;
    }

    .song-artist-label {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .song-main-title {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.1;
      text-shadow: 0 0 50px var(--gold-glow);
      margin-bottom: 20px;
    }

    .meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 20px; margin: 20px 0; }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }

    .meta-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .meta-value {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .key-pill {
      font-family: 'Cinzel', serif;
      background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 100%);
      color: var(--key-pill-text);
      padding: 5px 18px;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      display: inline-block;
    }

    .scale-display {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      color: var(--gold-dim);
      letter-spacing: 0.06em;
    }

    /* ── Nashville chart ── */
    .chart-section { margin-bottom: 32px; }

    .section-name {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-name::before { content: '◆'; font-size: 0.5rem; }
    .chords-row { display: flex; flex-wrap: wrap; gap: 10px; }

    .chord-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 78px;
      padding: 16px 14px 12px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.3s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .chord-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .chord-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(201,168,76,0.1);
    }

    .chord-number {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 20px rgba(201,168,76,0.3);
    }

    .chord-quality {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gold-bright);
      margin-top: 2px;
      min-height: 18px;
    }

    .chord-original {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 6px;
      font-family: 'Lato', sans-serif;
    }

    .chord-card.chromatic .chord-number { color: #9A88CC; text-shadow: 0 0 20px rgba(154,136,204,0.3); }
    .chord-card.chromatic { border-color: rgba(154,136,204,0.2); }

    /* Leyenda */
    .legend {
      padding: 18px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px 28px;
      transition: background 0.3s, border-color 0.3s;
    }

    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--text-dim); }
    .legend-num { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold); min-width: 18px; }

    .bg-key-deco {
      font-family: 'Cinzel', serif;
      font-size: 18rem;
      font-weight: 700;
      color: rgba(201,168,76,0.025);
      position: fixed;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    .no-results { padding: 20px 22px; font-size: 0.78rem; color: var(--text-dim); font-style: italic; }

  </style>
</head>
<body>

<!-- Botón flotante para reabrir sidebar -->
<button id="btn-reopen" onclick="toggleSidebar()" title="Mostrar menú" aria-label="Abrir menú">
  <div class="ham-bar"></div>
  <div class="ham-bar"></div>
  <div class="ham-bar"></div>
</button>


<!-- ══════════════════════════════════════════
     SIDEBAR
══════════════════════════════════════════ -->
<aside id="sidebar">

  <!-- Brand + botón hamburguesa -->
  <div class="brand-area">
    <div class="brand-text">
      <div class="brand-top">♪ Equipo de</div>
      <div class="brand-name">Alabanza</div>
      <div class="brand-sub">Sistema Nashville</div>
    </div>
    <button class="ham-btn" onclick="toggleSidebar()" title="Ocultar menú" aria-label="Ocultar menú">
      <div class="ham-bar"></div>
      <div class="ham-bar"></div>
      <div class="ham-bar"></div>
    </button>
  </div>

  <!-- Buscador -->
  <div class="search-wrap">
    <input
      type="text"
      class="search-input"
      id="search-input"
      placeholder="Buscar canción…"
      oninput="filterSongs(this.value)"
    >
  </div>

  <!-- Lista -->
  <div id="song-list"></div>

  <!-- Footer: toggle de tema -->
  <div class="sidebar-footer">
    <span class="footer-label" id="theme-label">Modo oscuro</span>
    <div class="toggle-track" onclick="toggleTheme()" title="Cambiar tema" role="button" tabindex="0"
         onkeydown="if(event.key==='Enter'||event.key===' ')toggleTheme()">
      <div class="toggle-thumb" id="toggle-thumb">
        <span id="theme-icon">🌙</span>
      </div>
    </div>
  </div>

</aside>


<!-- ══════════════════════════════════════════
     PANEL PRINCIPAL
══════════════════════════════════════════ -->
<main id="main">
  <div id="content-area">
    <div id="welcome">
      <div class="welcome-icon">♭</div>
      <h1 style="font-family:'Cinzel',serif; font-size:1.8rem; color:var(--gold); font-weight:700;">
        Portal de Alabanza
      </h1>
      <p style="color:var(--text-dim); max-width:300px; line-height:1.7; font-size:0.9rem;">
        Selecciona una canción del repertorio para ver su cifrado en el
        <strong style="color:var(--text-main);">Sistema Numérico Nashville</strong>.
      </p>
      <div class="deco-line" style="width:120px; margin-top:8px;"></div>
      <div style="font-size:0.7rem; color:var(--text-dim); letter-spacing:0.14em; text-transform:uppercase;">
        <span id="welcome-count"></span>
      </div>
    </div>
  </div>
</main>

// ══════════════════════════════════════════
//  MOTOR NASHVILLE
// ══════════════════════════════════════════
const CHROMATIC      = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ENHARMONIC     = { 'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B','E#':'F','B#':'C' };
const MAJOR_INTERVALS = [0,2,4,5,7,9,11];
const DEGREE_NAMES   = { 1:'Tónica',2:'Supertónica',3:'Mediante',4:'Subdominante',5:'Dominante',6:'Superdominante',7:'Sensible' };

const normalize = n => ENHARMONIC[n] || n;

function buildMajorScale(key) {
  const idx = CHROMATIC.indexOf(normalize(key));
  if (idx === -1) return null;
  return MAJOR_INTERVALS.map(i => CHROMATIC[(idx+i)%12]);
}

function parseChordRoot(chord) {
  if (chord.length >= 2 && (chord[1]==='#'||chord[1]==='b'))
    return { root: chord.substring(0,2), quality: chord.substring(2) };
  return { root: chord[0], quality: chord.substring(1) };
}

function chordToNashville(chord, scale) {
  if (!chord || !scale) return { number:chord, quality:'', original:chord };
  let slash='', main=chord;
  const si = chord.indexOf('/');
  if (si > 0) {
    main = chord.substring(0,si);
    const bi = scale.indexOf(normalize(chord.substring(si+1)));
    slash = '/' + (bi>=0 ? String(bi+1) : chord.substring(si+1));
  }
  const { root, quality } = parseChordRoot(main);
  const deg = scale.indexOf(normalize(root));
  if (deg === -1) return { number:chord, quality:'', slash:'', original:chord, chromatic:true };
  return { number:String(deg+1), quality, slash, original:chord, chromatic:false, degreeName:DEGREE_NAMES[deg+1]||'' };
}

function convertSection(chords, key) {
  const scale = buildMajorScale(key);
  return scale ? chords.map(c => chordToNashville(c, scale)) : [];
}


// ══════════════════════════════════════════
//  SIDEBAR TOGGLE
// ══════════════════════════════════════════
function toggleSidebar() {
  document.body.classList.toggle('sidebar-hidden');
}


// ══════════════════════════════════════════
//  FAVORITOS
// ══════════════════════════════════════════
let favorites = new Set(
  JSON.parse(localStorage.getItem('alabanza-favs') || '[]')
);

function saveFavorites() {
  localStorage.setItem('alabanza-favs', JSON.stringify([...favorites]));
}

function toggleFavorite(event, songId) {
  event.stopPropagation();
  if (favorites.has(songId)) {
    favorites.delete(songId);
  } else {
    favorites.add(songId);
  }
  saveFavorites();
  renderSongList();
}


// ══════════════════════════════════════════
//  TEMA DARK / LIGHT
// ══════════════════════════════════════════
function toggleTheme() {
  const light = document.body.classList.toggle('light');
  document.getElementById('theme-icon').textContent  = light ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = light ? 'Modo claro' : 'Modo oscuro';
  localStorage.setItem('alabanza-theme', light ? 'light' : 'dark');
}


// ══════════════════════════════════════════
//  RENDER — LISTA SIDEBAR
// ══════════════════════════════════════════
let activeSongId = null;

function buildSongItem(song, index) {
  const isFav = favorites.has(song.id);
  const isActive = activeSongId === song.id;
  return `
    <div class="song-item${isActive?' active':''}" id="item-${song.id}"
         data-active="${isActive}" onclick="loadSong(${song.id})">
      <div class="song-num">${String(index).padStart(2,'0')}</div>
      <div class="song-info">
        <div class="song-title-list">${song.title}</div>
        <div class="song-meta">${song.artist} · ${song.key} Mayor</div>
      </div>
      <button class="star-btn${isFav?' fav':''}"
              onclick="toggleFavorite(event,${song.id})"
              title="${isFav?'Quitar de favoritos':'Añadir a favoritos'}"
              aria-label="${isFav?'Quitar favorito':'Añadir favorito'}">
        ${isFav ? '★' : '☆'}
      </button>
    </div>`;
}

function renderSongList(filtered) {
  const baseList = filtered || SONGS;
  const container = document.getElementById('song-list');

  if (!baseList.length) {
    container.innerHTML = '<div class="no-results">No se encontraron canciones.</div>';
    return;
  }

  const favSongs   = baseList.filter(s => favorites.has(s.id));
  const restSongs  = baseList.filter(s => !favorites.has(s.id));
  let html = '';
  let counter = 1;

  if (favSongs.length) {
    html += `<div class="list-section-header" style="color:var(--gold-dim);">★ Favoritos · ${favSongs.length}</div>`;
    html += favSongs.map(song => buildSongItem(song, counter++)).join('');

    if (restSongs.length) {
      html += `<div class="list-section-header" style="margin-top:6px;">Repertorio · ${restSongs.length}</div>`;
      html += restSongs.map(song => buildSongItem(song, counter++)).join('');
    }
  } else {
    html += `<div class="list-section-header">Repertorio · ${baseList.length} canciones</div>`;
    html += baseList.map(song => buildSongItem(song, counter++)).join('');
  }

  container.innerHTML = html;
}

function filterSongs(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderSongList(); return; }
  renderSongList(SONGS.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.artist.toLowerCase().includes(q) ||
    s.key.toLowerCase().includes(q)
  ));
}


// ══════════════════════════════════════════
//  RENDER — VISTA DE CANCIÓN
// ══════════════════════════════════════════
function loadSong(songId) {
  activeSongId = songId;
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('item-'+songId);
  if (el) el.classList.add('active');

  const song = SONGS.find(s => s.id===songId);
  if (!song) return;

  const scale    = buildMajorScale(song.key);
  const scaleStr = scale ? scale.join(' · ') : '—';

  const sectionsHTML = song.sections.map(sec => {
    const cards = convertSection(sec.chords, song.key).map(c => `
      <div class="chord-card${c.chromatic?' chromatic':''}" title="${c.degreeName||c.original}">
        <div class="chord-number">${c.number}${c.slash||''}</div>
        <div class="chord-quality">${c.quality||'&nbsp;'}</div>
        <div class="chord-original">${c.original}</div>
      </div>`).join('');
    return `
      <div class="chart-section">
        <div class="section-name">${sec.name}</div>
        <div class="chords-row">${cards}</div>
      </div>`;
  }).join('');

  const legendHTML = `
    <div style="margin-top:36px;">
      <div class="section-name">Referencia de Grados</div>
      <div class="legend">
        ${Object.entries(DEGREE_NAMES).map(([n,name])=>`
          <div class="legend-item">
            <span class="legend-num">${n}</span><span>${name}</span>
          </div>`).join('')}
        <div class="legend-item" style="color:rgba(154,136,204,0.7);">
          <span class="legend-num" style="color:#9A88CC;">(X)</span>
          <span>Acorde cromático</span>
        </div>
      </div>
    </div>`;

  document.getElementById('content-area').innerHTML = `
    <div class="bg-key-deco" aria-hidden="true">${song.key}</div>
    <div id="song-view">
      <div class="song-artist-label">${song.artist}</div>
      <h1 class="song-main-title">${song.title}</h1>
      <div class="deco-line" style="width:240px; margin-bottom:20px;"></div>
      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-label">Tonalidad</span>
          <span class="key-pill">${song.key} Mayor</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">BPM</span>
          <span class="meta-value">${song.bpm||'—'}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Compás</span>
          <span class="meta-value">${song.timeSignature||'4/4'}</span>
        </div>
        <div class="meta-item" style="flex:1; min-width:220px;">
          <span class="meta-label">Escala (${song.key} Mayor)</span>
          <span class="scale-display">${scaleStr}</span>
        </div>
      </div>
      <div class="deco-line" style="margin:24px 0 32px;"></div>
      <div>
        <div style="font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.22em;
                    text-transform:uppercase; color:var(--gold-dim); margin-bottom:28px;">
          Cifrado en Sistema Numérico Nashville
        </div>
        ${sectionsHTML}
      </div>
      <div class="deco-line"></div>
      ${legendHTML}
      <div style="height:40px;"></div>
    </div>`;
}


// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
(function init() {
  if (localStorage.getItem('alabanza-theme') === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-icon').textContent  = '☀️';
    document.getElementById('theme-label').textContent = 'Modo claro';
  }
  renderSongList();
  const c = document.getElementById('welcome-count');
  if (c) c.textContent = SONGS.length + ' canciones en el repertorio';
})();
</script>
